<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="كتالوج الأثاث - تشكيلة متنوعة من الأثاث المنزلي العصري">
    <title>كتالوج الأثاث | Brshour Furniture</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #1f1f35;
            --accent-gold: #c9a84c;
            --accent-gold-light: #e8d48b;
            --accent-gold-dark: #8a6d20;
            --text-primary: #f0ece2;
            --text-secondary: #a8a4a0;
            --text-muted: #6b6760;
            --border-subtle: rgba(201, 168, 76, 0.15);
            --shadow-gold: rgba(201, 168, 76, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Header */
        .header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0.8rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo { display: flex; align-items: center; gap: 0.8rem; }
        .logo-icon {
            width: 40px; height: 40px; background: var(--accent-gold);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-weight: 900; color: var(--bg-primary);
        }
        .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--accent-gold); }

        .nav-links { display: flex; gap: 0.5rem; list-style: none; }
        .nav-links li a {
            color: var(--text-secondary); text-decoration: none;
            padding: 0.5rem 0.8rem; border-radius: 5px; font-size: 0.85rem;
            transition: 0.3s;
        }
        .nav-links li a:hover { color: var(--accent-gold); background: rgba(201, 168, 76, 0.1); }

        /* Hero */
        .hero {
            height: 40vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            margin-top: 80px; background: linear-gradient(to bottom, var(--bg-secondary), var(--bg-primary));
        }
        .hero h1 { font-size: 3rem; margin-bottom: 0.5rem; color: var(--accent-gold-light); }
        .hero p { color: var(--text-secondary); max-width: 600px; }

        /* Section Styles */
        .section { padding: 4rem 2rem; max-width: 1400px; margin: 0 auto; }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-title { font-size: 2rem; margin-bottom: 0.5rem; color: var(--accent-gold); }
        .section-subtitle { color: var(--text-muted); font-size: 0.9rem; }

        /* Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--bg-card); border-radius: 15px; overflow: hidden;
            border: 1px solid var(--border-subtle); transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--accent-gold); }

        .product-image { position: relative; width: 100%; padding-top: 100%; background: #000; }
        .product-image img {
            position: absolute; top:0; left:0; width:100%; height:100%; object-fit: contain;
        }

        .product-info { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .product-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; flex-grow: 1; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-subtle); padding-top: 1rem; }
        .product-price { font-weight: 800; color: var(--accent-gold); font-size: 1.2rem; }
        .product-code { font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; }

        /* Handwriting Area */
        .handwriting-area { margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed rgba(201,168,76,0.3); }
        .dots-line { border-bottom: 1px dotted var(--text-muted); height: 25px; margin-bottom: 5px; opacity: 0.5; }

        /* Buttons */
        .btn-float { position: fixed; bottom: 20px; z-index: 1000; display: flex; align-items: center; gap: 10px; padding: 12px 25px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .whatsapp-btn { left: 20px; background: #25D366; color: white; text-decoration: none; }
        .print-btn { right: 20px; background: var(--accent-gold); color: var(--bg-primary); }
        .btn-float:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Print Media Query */
        @media print {
            .header, .hero, .btn-float, .product-image .zoom-btn { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .section { padding: 10px 0 !important; page-break-after: always; }
            .section-title { color: black !important; text-align: center !important; font-size: 1.8rem !important; }
            .product-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 1cm !important; }
            .product-card { 
                border: 1px solid #ccc !important; background: white !important; 
                page-break-inside: avoid !important; display: flex !important; flex-direction: column !important;
            }
            .product-image { height: 180px !important; padding-top: 0 !important; border-bottom: 1px solid #ccc !important; }
            .product-image img { position: relative !important; object-fit: contain !important; }
            .product-info { padding: 10px !important; }
            .product-name, .product-desc, .product-price { color: black !important; }
            .dots-line { border-bottom: 1px dotted #000 !important; opacity: 1 !important; height: 25px !important; }
            .handwriting-area { display: block !important; border-top: 1px solid #eee !important; margin-top: 10px !important; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .header { padding: 0.5rem 1rem; }
            .nav-links { display: none; }
            .hero h1 { font-size: 2rem; }
            .product-grid { grid-template-columns: 1fr; }
            .btn-float span { display: none; }
            .btn-float { padding: 15px; border-radius: 50%; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">BF</div>
            <div class="logo-text">Brshour</div>
        </div>
        <ul class="nav-links">
            <li><a href="#tv-units">تلفزيون</a></li>
            <li><a href="#sofas">أنتريهات</a></li>
            <li><a href="#dining">سفرة</a></li>
            <li><a href="#bedrooms">نوم</a></li>
        </ul>
    </header>

    <section class="hero">
        <h1>كتالوج الأثاث المنزلي</h1>
        <p>تصفح أرقى التصميمات وقم بطباعة القائمة لتدوين ملاحظاتك</p>
    </section>

    <!-- Sections will be injected here -->
    <main id="main-content">
        <section class="section" id="tv-units">
            <div class="section-header">
                <h2 class="section-title">وحدات التلفزيون</h2>
                <div class="section-subtitle" id="tv-count"></div>
            </div>
            <div class="product-grid" id="tv-grid"></div>
        </section>

        <section class="section" id="shoe-cabinets">
            <div class="section-header">
                <h2 class="section-title">جزامات</h2>
                <div class="section-subtitle" id="shoe-count"></div>
            </div>
            <div class="product-grid" id="shoe-grid"></div>
        </section>

        <section class="section" id="sofas">
            <div class="section-header">
                <h2 class="section-title">أنتريهات وكنب</h2>
                <div class="section-subtitle" id="sofa-count"></div>
            </div>
            <div class="product-grid" id="sofa-grid"></div>
        </section>

        <section class="section" id="kitchens">
            <div class="section-header">
                <h2 class="section-title">مطابخ</h2>
                <div class="section-subtitle" id="kitchen-count"></div>
            </div>
            <div class="product-grid" id="kitchen-grid"></div>
        </section>

        <section class="section" id="dining">
            <div class="section-header">
                <h2 class="section-title">غرف سفرة</h2>
                <div class="section-subtitle" id="dining-count"></div>
            </div>
            <div class="product-grid" id="dining-grid"></div>
        </section>

        <section class="section" id="bedrooms">
            <div class="section-header">
                <h2 class="section-title">غرف نوم</h2>
                <div class="section-subtitle" id="bedroom-count"></div>
            </div>
            <div class="product-grid" id="bedroom-grid"></div>
        </section>

        <section class="section" id="wardrobes">
            <div class="section-header">
                <h2 class="section-title">دواليب</h2>
                <div class="section-subtitle" id="wardrobe-count"></div>
            </div>
            <div class="product-grid" id="wardrobe-grid"></div>
        </section>
    </main>

    <a href="https://wa.me/201000266475" class="btn-float whatsapp-btn" target="_blank">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <span>واتساب</span>
    </a>

    <button class="btn-float print-btn" onclick="window.print()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
        <span>طباعة</span>
    </button>

    <script src="data.js"></script>
    <script>
        function createProductCard(item) {
            return `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${item.src}" alt="${item.name}" loading="lazy">
                        <div class="product-badge">${item.code}</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${item.name}</h3>
                        <p class="product-desc">${item.desc}</p>
                        <div class="product-footer">
                            <div class="product-price">${item.price} ج.م</div>
                            <div class="product-code">${item.code}</div>
                        </div>
                        <div class="handwriting-area">
                            <div class="dots-line"></div>
                            <div class="dots-line"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.onload = () => {
            if (typeof categories === 'undefined') {
                console.error("Data file NOT loaded!");
                return;
            }

            Object.keys(categories).forEach(key => {
                const cat = categories[key];
                const grid = document.getElementById(cat.grid);
                const countEl = document.getElementById(cat.count);
                
                if (grid) {
                    let html = '';
                    cat.images.forEach(item => {
                        html += createProductCard(item);
                    });
                    grid.innerHTML = html;
                }
                if (countEl) {
                    countEl.textContent = `${cat.images.length} قطعة`;
                }
            });
        };
    </script>
</body>
</html>
